name: publish

# Publishes to PyPI automatically when you push a version tag like "v0.1.0".
#
# Two ways to authenticate (pick one — see INSTRUCTIONS.md step "Auto-publish"):
#
#   A) Trusted Publishing (RECOMMENDED, no secrets):
#      Configure a "pending publisher" on PyPI/TestPyPI pointing at this repo +
#      workflow. The `id-token: write` permission below lets the action mint a
#      short-lived OIDC token automatically — no API token needed.
#
#   B) API token:
#      Comment out the OIDC block, uncomment the `password:` line in each
#      publish step, and add PYPI_API_TOKEN / TEST_PYPI_API_TOKEN as repo
#      secrets (Settings -> Secrets and variables -> Actions).

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check artifacts with twine
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write   # required for Trusted Publishing (option A)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # password: ${{ secrets.TEST_PYPI_API_TOKEN }}   # option B
          skip-existing: true

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (option A)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # password: ${{ secrets.PYPI_API_TOKEN }}   # option B
          skip-existing: true
